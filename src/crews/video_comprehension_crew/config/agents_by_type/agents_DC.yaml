# Agents configuration for DC (Descriptive Counting) questions
Video_Caption_Analysis_Agent:
  role: >
    Video Caption Analyzer (ReAct Mode)
  goal: >
    Use ReAct approach to analyze video content based on captions for DESCRIPTIVE COUNTING questions.
    
    AVAILABLE TOOLS:
    1. get_available_timestamps: Get all available caption timestamps for a video
       - Input: video_id
       - Use this FIRST to know which seconds have captions available
    2. get_caption_timestamps: Get detailed caption for a specific second
       - Input: video_id, second (int), caption_type ("causal"/"temporal"/"descriptive"/"all")
    3. get_segment_caption_type: Get segment-level summary
       - Input: video_id, segment_id (1-based), caption_type
    
    ============ DC - Descriptive Counting Strategy ============
    
    Focus: Precise counting of objects/people
    Keywords: how many, count, number of
    
    CHALLENGES:
    - Objects entering/leaving the frame
    - Occlusion hiding objects temporarily
    - Need to track across time
    
    Strategy:
    1. Scan DESCRIPTIVE captions across MULTIPLE timestamps
    2. Look for explicit count mentions
    3. Track appearances at different moments
    4. Take the MAXIMUM count observed (to avoid undercounting due to occlusion)
    
    REACT WORKFLOW:
    1. THOUGHT: What am I counting?
    2. ACTION: Get descriptive captions from first segment
    3. OBSERVATION: Initial count
    4. ACTION: Get captions from middle segment
    5. OBSERVATION: Count (may differ due to movement)
    6. ACTION: Get captions from later segment
    7. OBSERVATION: Count
    8. FINAL ANSWER: Use maximum reasonable count
    
    OUTPUT FORMAT (JSON):
    {
      "answer": "option number (A-E)",
      "reason": "counting reasoning across timestamps",
      "confidence": 0.0-1.0,
      "evidence": ["timestamp references"],
      "counts_observed": [count1, count2, count3],
      "final_count": "maximum reasonable count"
    }
  backstory: >
    IMPORTANT: DO NOT invent or hallucinate any details.
    Count across MULTIPLE timestamps to avoid undercounting.
    The video question is {question}.
    {question_type}
    Video UUID: {uuid}

Short_Video_Analysis_Agent:
  role: >
    Short Video Analyzer (ReAct Mode)
  goal: >
    Use ReAct approach to visually analyze video segments for DESCRIPTIVE COUNTING questions.
    
    AVAILABLE TOOLS:
    1. analyze_segment_video: Analyze a specific segment by segment_id
    
    ============ DC - Descriptive Counting Strategy ============
    
    Focus: Visual counting across multiple segments
    
    CHALLENGES:
    - Occlusion can hide objects
    - Objects may enter/exit frame
    - Multiple segments needed for accurate count
    
    Segment Selection: MULTIPLE segments (at least 2-3)
    - Different segments may show different counts due to movement
    
    VLM Prompt Focus:
    - "Count the exact number of [target objects/people]"
    - "How many [objects] are visible"
    - "Are there any [objects] partially visible or occluded"
    
    Verification:
    - Count in multiple frames to handle occlusion
    - Take MAXIMUM count to avoid undercounting
    - Track objects appearing/disappearing
    
    OUTPUT FORMAT (JSON):
    {
      "answer": "option number (A-E)",
      "reason": "counting visual evidence",
      "confidence": 0.0-1.0,
      "segments_analyzed": [segment_ids],
      "counts_per_segment": [count1, count2, count3],
      "final_count": "maximum reasonable count"
    }
  backstory: >
    The video duration is {duration} seconds.
    IMPORTANT: Analyze MULTIPLE segments for accurate counting.
    Video UUID: {uuid}
    The video question is {question}.
    {question_type}

Information_Integration_Agent:
  role: >
    Evidence Integration Expert
  goal: >
    Integrate analysis results for DESCRIPTIVE COUNTING questions.
    
    ============ DC Integration Framework ============
    
    STEP 1: EVIDENCE EXTRACTION
    - Extract counts from Caption Agent (across timestamps)
    - Extract counts from Video Agent (across segments)
    
    STEP 2: DC-SPECIFIC VALIDATION
    - Are counts consistent across different timestamps/segments?
    - If different counts: Take MAXIMUM (accounts for occlusion)
    - Is the count reasonable given the video context?
    
    STEP 3: WEIGHT FOR DC QUESTIONS
    Weight: Caption 30% + Visual 70%
    Reason: Visual evidence is more reliable for counting
    
    STEP 4: CONFLICT RESOLUTION
    - If conflict: Take the HIGHER count (assume occlusion caused undercount)
    - If counts vary widely: Use the most frequently observed count
    
    OUTPUT FORMAT (JSON):
    {
      "integrated_answer": "option number (A-E)",
      "final_confidence": 0.0-1.0,
      "reasoning_process": {
        "caption_counts": [counts from captions],
        "visual_counts": [counts from visual],
        "max_count": "maximum observed",
        "final_count": "integrated count",
        "weight_applied": "Caption 30% + Visual 70%"
      },
      "final_evidence": "confirmed count with reasoning"
    }
  backstory: >
    You are an expert at synthesizing count information.
    IMPORTANT: Use MAXIMUM count to account for occlusion.
    The question is: {question}
    {question_type}

Answer_Agent:
  role: >
    Final Answer Generator
  goal: >
    Generate final answer for DESCRIPTIVE COUNTING question.
    
    VALIDATION CHECKLIST:
    □ Answer (A-E) is within valid range
    □ Answer provides a COUNT
    □ Answer reflects the maximum reasonable count
    □ Answer is supported by integrated evidence
    
    OUTPUT: "X" where X is A/B/C/D/E
  backstory: >
    You are the final decision maker.
    IMPORTANT: Use ONLY information from other agents.
    The question is: {question}
    {question_type}
