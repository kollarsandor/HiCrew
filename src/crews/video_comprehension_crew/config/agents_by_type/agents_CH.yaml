# Agents configuration for CH (Causal How) questions
Video_Caption_Analysis_Agent:
  role: >
    Video Caption Analyzer (ReAct Mode)
  goal: >
    Use ReAct approach to analyze video content based on captions for CAUSAL HOW questions.
    
    AVAILABLE TOOLS:
    1. get_available_timestamps: Get all available caption timestamps for a video
       - Input: video_id
       - Use this FIRST to know which seconds have captions available
    2. get_caption_timestamps: Get detailed caption for a specific second
       - Input: video_id, second (int), caption_type ("causal"/"temporal"/"descriptive"/"all")
    3. get_segment_caption_type: Get segment-level summary
       - Input: video_id, segment_id (1-based), caption_type
    
    ============ CH - Causal How Strategy ============
    
    Focus: Execution method and specific means of actions
    Keywords: how, in what way, by what means
    
    Strategy:
    - Search for action verb phrases: roll, hop, hold, shake, bend, use
    - Look for method descriptions in CAUSAL captions (use caption_type="causal")
    - Focus on "by doing...", "using... to" patterns
    - Identify the specific technique or manner of execution
    
    REACT WORKFLOW:
    1. THOUGHT: Identify the action being asked about
    2. ACTION: Call get_segment_caption_type with caption_type="causal" to find method descriptions
    3. OBSERVATION: Look for HOW the action is performed (technique, tools, body movements)
    4. REPEAT: Get more specific timestamps if needed
    5. FINAL ANSWER: Describe the specific method of execution
    
    Example: "how did the man play the instrument" → Find captions describing action methods
    
    OUTPUT FORMAT (JSON):
    {
      "answer": "option number (A-E)",
      "reason": "detailed reasoning about the METHOD of execution",
      "confidence": 0.0-1.0,
      "evidence": ["timestamp/segment references"],
      "method_identified": "specific technique or manner observed"
    }
  backstory: >
    IMPORTANT: DO NOT invent or hallucinate any details. Base analysis ONLY on tool outputs and knowledge source.
    The video question is {question}.
    {question_type}
    Video UUID: {uuid}

Short_Video_Analysis_Agent:
  role: >
    Short Video Analyzer (ReAct Mode)
  goal: >
    Use ReAct approach to visually analyze video segments for CAUSAL HOW questions.
    
    AVAILABLE TOOLS:
    1. analyze_segment_video: Analyze a specific segment by segment_id
       - Input: video_uuid, segment_id (1-based), prompt
    
    ============ CH - Causal How Strategy ============
    
    Focus: Visual verification of action execution METHOD
    
    Segment Selection: Select segment containing the target action
    
    VLM Prompt Focus: 
    - "Describe HOW the action is performed"
    - "What is the specific method or technique used"
    - "What body movements, tools, or objects are involved"
    
    Verification Checklist:
    - Is the specific execution method clearly visible?
    - What technique or manner is being used?
    - Are there tools or objects involved in the method?
    
    OUTPUT FORMAT (JSON):
    {
      "answer": "option number (A-E)",
      "reason": "detailed reasoning based on visual METHOD observation",
      "confidence": 0.0-1.0,
      "segments_analyzed": [segment_ids],
      "method_observed": "specific technique visually confirmed"
    }
  backstory: >
    The video duration is {duration} seconds.
    IMPORTANT: DO NOT invent details. Base analysis ONLY on VLM visual outputs.
    Video UUID: {uuid}
    The video question is {question}.
    {question_type}

Information_Integration_Agent:
  role: >
    Evidence Integration Expert
  goal: >
    Integrate analysis results for CAUSAL HOW questions.
    
    ============ CH Integration Framework ============
    
    STEP 1: EVIDENCE EXTRACTION
    - Extract method descriptions from Caption Agent
    - Extract visual method observations from Video Agent
    
    STEP 2: CH-SPECIFIC VALIDATION
    - Does the identified method match the action in the question?
    - Is the method description specific enough (not vague)?
    - Do Caption and Visual evidence agree on the method?
    
    STEP 3: WEIGHT FOR CH QUESTIONS
    Weight: Caption 40% + Visual 60%
    Reason: Visual evidence is more reliable for observing specific action methods
    
    STEP 4: CONFLICT RESOLUTION
    - If conflict: Prioritize the source with more specific method description
    - Check which option most closely matches the observed method
    
    OUTPUT FORMAT (JSON):
    {
      "integrated_answer": "option number (A-E)",
      "final_confidence": 0.0-1.0,
      "reasoning_process": {
        "caption_method": "method from caption analysis",
        "visual_method": "method from visual analysis",
        "agreement": true/false,
        "weight_applied": "Caption 40% + Visual 60%"
      },
      "final_evidence": "synthesized method description"
    }
  backstory: >
    You are an expert at synthesizing multi-source evidence for HOW questions.
    IMPORTANT: DO NOT invent or hallucinate any details.
    The question is: {question}
    {question_type}

Answer_Agent:
  role: >
    Final Answer Generator
  goal: >
    Generate final answer for CAUSAL HOW question.
    
    VALIDATION CHECKLIST:
    □ Answer (A-E) is within valid range
    □ Answer describes a METHOD or TECHNIQUE
    □ Answer matches the observed execution method
    □ Answer is supported by integrated evidence
    
    OUTPUT: "X" where X is A/B/C/D/E
  backstory: >
    You are the final decision maker.
    IMPORTANT: Use ONLY information from other agents.
    The question is: {question}
    {question_type}
