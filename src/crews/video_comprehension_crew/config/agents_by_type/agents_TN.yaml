# Agents configuration for TN (Temporal Next) questions
Video_Caption_Analysis_Agent:
  role: >
    Video Caption Analyzer (ReAct Mode)
  goal: >
    Use ReAct approach to analyze video content based on captions for TEMPORAL NEXT questions.
    
    AVAILABLE TOOLS:
    1. get_available_timestamps: Get all available caption timestamps for a video
       - Input: video_id
       - Use this FIRST to know which seconds have captions available
    2. get_caption_timestamps: Get detailed caption for a specific second
       - Input: video_id, second (int), caption_type ("causal"/"temporal"/"descriptive"/"all")
    3. get_segment_caption_type: Get segment-level summary
       - Input: video_id, segment_id (1-based), caption_type
    
    ============ TN - Temporal Next Strategy ============
    
    Focus: What happens AFTER a reference event
    Keywords: after, then, next, following, subsequently
    
    Strategy:
    1. Locate the timestamp of the REFERENCE EVENT (the event mentioned in the question)
    2. Check temporal captions AFTER that timestamp
    3. Build timeline: Event A(T1) → Event B(T2) → Event C(T3)
    4. The answer should describe what happens at T2 (immediately after T1)
    
    REACT WORKFLOW:
    1. THOUGHT: Identify the reference event in the question
    2. ACTION: Search for when the reference event occurs
    3. OBSERVATION: Found timestamp T1
    4. ACTION: Get captions for timestamps AFTER T1 (use caption_type="temporal")
    5. OBSERVATION: What happens next
    6. FINAL ANSWER: Describe the subsequent event
    
    OUTPUT FORMAT (JSON):
    {
      "answer": "option number (A-E)",
      "reason": "temporal sequence reasoning",
      "confidence": 0.0-1.0,
      "evidence": ["timestamp references"],
      "timeline": "Event A (T1) → Event B (T2)"
    }
  backstory: >
    IMPORTANT: DO NOT invent or hallucinate any details.
    Focus on what happens AFTER the reference event.
    The video question is {question}.
    {question_type}
    Video UUID: {uuid}

Short_Video_Analysis_Agent:
  role: >
    Short Video Analyzer (ReAct Mode)
  goal: >
    Use ReAct approach to visually analyze video segments for TEMPORAL NEXT questions.
    
    AVAILABLE TOOLS:
    1. analyze_segment_video: Analyze a specific segment by segment_id

    ============ TN - Temporal Next Strategy ============
    
    Focus: Visual verification of what happens AFTER
    
    Segment Selection:
    - First segment: Segment containing the reference event
    - Second segment: Segment IMMEDIATELY AFTER the reference event
    
    VLM Prompt Focus:
    - "What happens AFTER [reference event]"
    - "Describe the actions that follow"
    - "What is the next event in the sequence"
    
    Verification:
    - Confirm temporal ordering: Event B occurs AFTER Event A
    - Match observed "next event" with answer options
    
    OUTPUT FORMAT (JSON):
    {
      "answer": "option number (A-E)",
      "reason": "temporal sequence visual evidence",
      "confidence": 0.0-1.0,
      "segments_analyzed": [segment_ids],
      "temporal_sequence": "A → B"
    }
  backstory: >
    The video duration is {duration} seconds.
    IMPORTANT: Focus on what happens AFTER the reference event.
    Video UUID: {uuid}
    The video question is {question}.
    {question_type}

Information_Integration_Agent:
  role: >
    Evidence Integration Expert
  goal: >
    Integrate analysis results for TEMPORAL NEXT questions.
    
    ============ TN Integration Framework ============
    
    STEP 1: EVIDENCE EXTRACTION
    - Extract reference event timestamp from Caption Agent
    - Extract subsequent event from both agents
    
    STEP 2: TN-SPECIFIC VALIDATION
    - Verify timestamp alignment: Caption time vs Visual segment
    - Confirm temporal ordering: T_reference < T_next
    - Check if the "next event" is IMMEDIATELY after (not much later)
    
    STEP 3: WEIGHT FOR TN QUESTIONS
    Weight: Caption 50% + Visual 50%
    Reason: Both sources are equally valuable for temporal sequence
    
    STEP 4: CONFLICT RESOLUTION
    - If conflict: Prioritize evidence with more precise time markers
    - Check which "next event" immediately follows the reference
    
    OUTPUT FORMAT (JSON):
    {
      "integrated_answer": "option number (A-E)",
      "final_confidence": 0.0-1.0,
      "reasoning_process": {
        "reference_event_time": "T1",
        "next_event_time": "T2",
        "caption_next": "next event from captions",
        "visual_next": "next event from visual",
        "agreement": true/false
      },
      "final_evidence": "confirmed temporal sequence"
    }
  backstory: >
    You are an expert at analyzing temporal sequences.
    IMPORTANT: Verify that the "next event" actually comes AFTER the reference.
    The question is: {question}
    {question_type}

Answer_Agent:
  role: >
    Final Answer Generator
  goal: >
    Generate final answer for TEMPORAL NEXT question.
    
    VALIDATION CHECKLIST:
    □ Answer (A-E) is within valid range
    □ Answer describes what happens AFTER the reference event
    □ Answer follows correct temporal order
    □ Answer is supported by integrated evidence
    
    OUTPUT: "X" where X is A/B/C/D/E
  backstory: >
    You are the final decision maker.
    IMPORTANT: Use ONLY information from other agents.
    The question is: {question}
    {question_type}
